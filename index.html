<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TVBS 2026 品牌發表會</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap');

  *, *::before, *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  :root {
    --black: #000000;
    --white: #ffffff;
    --dim: #aaaaaa;
    --gold: #C8A96E;
    --bg-surface: #0a0a0a;
  }

  body {
    font-family: 'Helvetica Neue', Arial, 'Noto Sans TC', sans-serif;
    background: var(--black);
    color: var(--white);
    max-width: 480px;
    margin: 0 auto;
    min-height: 100vh;
    text-align: center; /* 全域置中對齊 */
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }

  .container {
    padding: 40px 24px 60px;
  }

  /* 1. 主視覺 (放大至 90%) */
  .hero-section {
    width: 90%;
    margin: 0 auto 40px;
  }
  .hero-section video {
    width: 100%;
    height: auto;
    display: block;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  }

  /* 2 & 3. What is Real 主題區塊 */
  .theme-section {
    margin-bottom: 50px;
  }
  .theme-title {
    font-size: 32px;
    font-weight: 900;
    color: var(--white);
    letter-spacing: 2px;
    margin-bottom: 12px;
  }
  .theme-subtitle {
    font-size: 16px;
    font-weight: 500;
    color: var(--white);
    letter-spacing: 4px;
  }

  /* 4. Logo 與活動名稱區塊 */
  .brand-section {
    margin-bottom: 40px;
  }
  .tvbs-logo {
    width: 120px;
    margin: 0 auto 24px;
    display: block;
  }
  .event-year {
    font-size: 24px;
    font-weight: 700;
    color: var(--gold);
    letter-spacing: 6px;
    margin-bottom: 4px;
  }
  .event-name {
    font-size: 28px;
    font-weight: 900;
    color: var(--gold);
    letter-spacing: 8px;
  }

  /* 5. 時間地點資訊 */
  .meta-section {
    margin-bottom: 50px;
    font-size: 15px;
    color: var(--dim);
    line-height: 1.8;
    letter-spacing: 1px;
  }
  .meta-section p {
    margin-bottom: 4px;
  }

  /* 6. 內文區塊 (包含新的文字放大樣式) */
  .copy-section {
    margin-bottom: 50px;
    font-size: 16px;
    font-weight: 500;
    color: var(--white);
    line-height: 2.2;
    letter-spacing: 1px;
  }
  
  /* 放大 120% 的樣式 */
  .text-120 {
    font-size: 1.2em;
    font-weight: 700;
    display: block;
    margin: 4px 0;
  }

  /* 放大 150% 的樣式 (加入金色與加粗讓情緒更跳) */
  .text-150 {
    font-size: 1.5em;
    font-weight: 900;
    color: var(--gold);
    letter-spacing: 4px;
    display: block;
    margin: 4px 0 16px; /* 加大下邊距讓排版有呼吸空間 */
  }

  /* 7. 重點資訊 Highlight */
  .highlight-section {
    margin-bottom: 60px;
  }
  .highlight-block {
    margin-bottom: 24px;
  }
  .highlight-title {
    font-size: 18px;
    font-weight: 700;
    color: var(--gold);
    letter-spacing: 2px;
    margin-bottom: 8px;
  }
  .highlight-content {
    font-size: 15px;
    color: var(--white);
    font-weight: 400;
    letter-spacing: 1px;
  }
